name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy backend to Railway
    runs-on: ubuntu-latest
    # Skips automatically if RAILWAY_TOKEN is not configured.
    if: ${{ vars.DEPLOY_BACKEND_ENABLED == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --ci

  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    # Skips automatically if DEPLOY_FRONTEND_ENABLED variable is not set to 'true'.
    if: ${{ vars.DEPLOY_FRONTEND_ENABLED == 'true' }}
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${VERCEL_TOKEN}

      - name: Build
        working-directory: frontend
        run: vercel build --prod --token=${VERCEL_TOKEN}

      - name: Deploy
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${VERCEL_TOKEN}

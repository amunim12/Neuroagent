name: Build → Docker Hub → Railway

# Triggered only after CI passes on main, or manually.
# Pattern: push to GitHub → CI → build Docker images → push to Docker Hub → redeploy on Railway.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── 1. Build + push images ──────────────────────────────────────────────────
  publish:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    # Only run when CI succeeded (workflow_run trigger) or manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: amunim12/neuroagent-backend
          - service: frontend
            context: ./frontend
            image: amunim12/neuroagent-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push backend
        if: matrix.service == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: false

      - name: Build and push frontend
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: false
          # NEXT_PUBLIC_* vars are baked into the image at build time.
          # Set RAILWAY_BACKEND_URL in GitHub Actions variables to point at
          # your Railway backend service public URL.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.RAILWAY_BACKEND_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.RAILWAY_BACKEND_WS_URL }}

  # ── 2. Trigger Railway redeploy ─────────────────────────────────────────────
  deploy:
    name: Redeploy on Railway
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Redeploy backend
        if: ${{ vars.RAILWAY_BACKEND_WEBHOOK != '' }}
        run: curl -s -X POST "${{ vars.RAILWAY_BACKEND_WEBHOOK }}"

      - name: Redeploy frontend
        if: ${{ vars.RAILWAY_FRONTEND_WEBHOOK != '' }}
        run: curl -s -X POST "${{ vars.RAILWAY_FRONTEND_WEBHOOK }}"
